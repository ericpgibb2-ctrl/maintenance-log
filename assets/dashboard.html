<!--
Maintenance Log dashboard — rendered inline in the Gallery chat.
Reads records from localStorage; supports inline edit, delete, copy JSONL.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance Log</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f1b2d, #132741, #0d3b5e);
      --glass-bg: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.12);
      --text-main: #ffffff;
      --text-dim: rgba(255, 255, 255, 0.6);
      --accent-low: #7ec8e3;
      --accent-medium: #f4c95d;
      --accent-high: #f58b4c;
      --accent-urgent: #ef4b4b;
      --accent-primary: #4ecca3;
      --card-shadow: 0 6px 24px 0 rgba(0, 0, 0, 0.45);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
    body {
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      padding: 16px;
    }
    header { text-align: center; margin-bottom: 18px; }
    h1 {
      font-weight: 700;
      font-size: 1.6rem;
      letter-spacing: -0.3px;
      background: linear-gradient(to right, #4ecca3, #7ec8e3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sub { font-size: 0.85rem; color: var(--text-dim); margin-top: 4px; }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .tool-btn {
      flex: 1;
      min-width: 110px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      padding: 9px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      backdrop-filter: blur(10px);
    }
    .tool-btn.primary {
      background: var(--accent-primary);
      color: #0f1b2d;
      border-color: transparent;
    }
    .tool-btn.danger {
      border-color: rgba(239, 75, 75, 0.4);
      color: var(--accent-urgent);
    }
    .tool-btn:active { transform: scale(0.97); }

    .record {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: var(--card-shadow);
      backdrop-filter: blur(14px);
    }
    .record-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }
    .record-meta { font-size: 0.75rem; color: var(--text-dim); }
    .severity-pill {
      padding: 3px 10px;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .sev-low { background: var(--accent-low); color: #0f1b2d; }
    .sev-medium { background: var(--accent-medium); color: #0f1b2d; }
    .sev-high { background: var(--accent-high); color: #0f1b2d; }
    .sev-urgent {
      background: var(--accent-urgent);
      color: #fff;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 75, 75, 0.4); }
      50% { box-shadow: 0 0 0 6px rgba(239, 75, 75, 0); }
    }

    .observation {
      font-size: 1rem;
      font-weight: 400;
      line-height: 1.4;
      margin-bottom: 8px;
    }
    .equipment-line {
      font-size: 0.82rem;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .equipment-line strong { color: var(--text-main); font-weight: 600; }

    .actions-list {
      font-size: 0.82rem;
      color: var(--text-dim);
      padding-left: 16px;
      margin-top: 4px;
    }
    .actions-list li { margin-bottom: 2px; }

    .record-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--glass-border);
    }
    .record-id { font-family: monospace; font-size: 0.7rem; color: var(--text-dim); }
    .row-btns { display: flex; gap: 8px; }
    .row-btn {
      background: transparent;
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      padding: 5px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.75rem;
    }
    .row-btn.delete { color: var(--accent-urgent); border-color: rgba(239, 75, 75, 0.3); }

    .empty {
      text-align: center;
      padding: 40px 16px;
      color: var(--text-dim);
      font-size: 0.95rem;
    }

    /* Edit modal */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      z-index: 10;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #14253b;
      border-top: 1px solid var(--glass-border);
      border-radius: 18px 18px 0 0;
      width: 100%;
      max-width: 480px;
      padding: 20px 18px 28px;
      animation: slideUp 0.22s ease-out;
      max-height: 88vh;
      overflow-y: auto;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal h2 { font-size: 1.1rem; margin-bottom: 14px; }
    .field { margin-bottom: 12px; }
    .field label {
      display: block;
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      padding: 9px 11px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: 'Outfit', sans-serif;
    }
    .field textarea { resize: vertical; min-height: 70px; }
    .modal-btns { display: flex; gap: 10px; margin-top: 14px; }
    .modal-btns button { flex: 1; }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent-primary);
      color: #0f1b2d;
      padding: 10px 18px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.88rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      z-index: 20;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <header>
    <h1>Maintenance Log</h1>
    <div class="sub" id="count-line">0 records · on-device only</div>
  </header>

  <div class="toolbar">
    <button class="tool-btn primary" id="copy-jsonl">Copy JSONL</button>
    <button class="tool-btn" id="toggle-raw">View raw</button>
    <button class="tool-btn danger" id="wipe-all">Wipe all</button>
  </div>

  <div id="list"></div>

  <div id="raw-block" style="display:none; margin-top: 14px;">
    <pre id="raw-json" style="background: rgba(0,0,0,0.35); padding: 12px; border-radius: 10px; font-family: monospace; font-size: 0.72rem; color: #a7e4c4; overflow-x: auto; white-space: pre-wrap; word-break: break-all;"></pre>
  </div>

  <div class="modal-backdrop" id="edit-backdrop">
    <div class="modal" id="edit-modal">
      <h2>Edit record</h2>
      <div class="field">
        <label>Location</label>
        <input type="text" id="f-location">
      </div>
      <div class="field">
        <label>Equipment type</label>
        <select id="f-equipment-type">
          <option>HVAC</option><option>electrical</option><option>plumbing</option>
          <option>fixture</option><option>elevator</option><option>exterior</option><option>other</option>
        </select>
      </div>
      <div class="field">
        <label>Equipment identifier</label>
        <input type="text" id="f-equipment-identifier" placeholder="e.g. Grundfos CM 3-4">
      </div>
      <div class="field">
        <label>Manufacturer</label>
        <input type="text" id="f-equipment-manufacturer">
      </div>
      <div class="field">
        <label>Observation</label>
        <textarea id="f-observation"></textarea>
      </div>
      <div class="field">
        <label>Severity</label>
        <select id="f-severity">
          <option>low</option><option>medium</option><option>high</option><option>urgent</option>
        </select>
      </div>
      <div class="field">
        <label>Suggested actions (one per line)</label>
        <textarea id="f-actions"></textarea>
      </div>
      <div class="modal-btns">
        <button class="tool-btn" id="edit-cancel">Cancel</button>
        <button class="tool-btn primary" id="edit-save">Save</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = 'maintenance_log_records_v1';

    function loadAll() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
      catch (_) { return []; }
    }
    function saveAll(records) { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); }

    function escapeHTML(s) {
      if (s === null || s === undefined) return '';
      return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[c]);
    }

    function formatWhen(iso) {
      try {
        const d = new Date(iso);
        return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      } catch (_) { return iso; }
    }

    function render() {
      const records = loadAll();
      const list = document.getElementById('list');
      document.getElementById('count-line').textContent =
        `${records.length} record${records.length === 1 ? '' : 's'} · on-device only`;

      if (records.length === 0) {
        list.innerHTML = '<div class="empty">No records yet. Describe an observation to the chat — with or without a photo — and it will land here.</div>';
      } else {
        // Newest first
        const sorted = [...records].sort((a, b) => (b.captured_at || '').localeCompare(a.captured_at || ''));
        list.innerHTML = sorted.map(r => `
          <div class="record" data-id="${escapeHTML(r.id)}">
            <div class="record-head">
              <div>
                <div class="record-meta">${escapeHTML(formatWhen(r.captured_at))}${r.location ? ' · ' + escapeHTML(r.location) : ''}</div>
              </div>
              <div class="severity-pill sev-${escapeHTML(r.severity)}">${escapeHTML(r.severity)}</div>
            </div>
            <div class="observation">${escapeHTML(r.observation) || '<em style="color: var(--text-dim)">(no observation)</em>'}</div>
            <div class="equipment-line">
              <strong>${escapeHTML(r.equipment?.type || 'other')}</strong>${r.equipment?.identifier ? ' · ' + escapeHTML(r.equipment.identifier) : ''}${r.equipment?.manufacturer ? ' · ' + escapeHTML(r.equipment.manufacturer) : ''}
            </div>
            ${Array.isArray(r.suggested_actions) && r.suggested_actions.length ? `
              <ul class="actions-list">${r.suggested_actions.map(a => `<li>${escapeHTML(a)}</li>`).join('')}</ul>
            ` : ''}
            <div class="record-footer">
              <span class="record-id">${escapeHTML(r.id)}</span>
              <div class="row-btns">
                <button class="row-btn edit">Edit</button>
                <button class="row-btn delete">Delete</button>
              </div>
            </div>
          </div>
        `).join('');
      }
      document.getElementById('raw-json').textContent = JSON.stringify(records, null, 2);
    }

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 1800);
    }

    function openEdit(id) {
      const records = loadAll();
      const r = records.find(x => x.id === id);
      if (!r) return;
      document.getElementById('f-location').value = r.location || '';
      document.getElementById('f-equipment-type').value = r.equipment?.type || 'other';
      document.getElementById('f-equipment-identifier').value = r.equipment?.identifier || '';
      document.getElementById('f-equipment-manufacturer').value = r.equipment?.manufacturer || '';
      document.getElementById('f-observation').value = r.observation || '';
      document.getElementById('f-severity').value = r.severity || 'medium';
      document.getElementById('f-actions').value = Array.isArray(r.suggested_actions) ? r.suggested_actions.join('\n') : '';
      document.getElementById('edit-backdrop').classList.add('open');
      document.getElementById('edit-backdrop').dataset.editingId = id;
    }

    function closeEdit() {
      document.getElementById('edit-backdrop').classList.remove('open');
      document.getElementById('edit-backdrop').dataset.editingId = '';
    }

    function saveEdit() {
      const id = document.getElementById('edit-backdrop').dataset.editingId;
      if (!id) return;
      const records = loadAll();
      const idx = records.findIndex(x => x.id === id);
      if (idx === -1) { closeEdit(); return; }
      const r = records[idx];
      r.location = document.getElementById('f-location').value.trim() || null;
      r.equipment = r.equipment || {};
      r.equipment.type = document.getElementById('f-equipment-type').value;
      r.equipment.identifier = document.getElementById('f-equipment-identifier').value.trim() || null;
      r.equipment.manufacturer = document.getElementById('f-equipment-manufacturer').value.trim() || null;
      r.observation = document.getElementById('f-observation').value.trim();
      r.severity = document.getElementById('f-severity').value;
      r.suggested_actions = document.getElementById('f-actions').value
        .split('\n').map(s => s.trim()).filter(Boolean).slice(0, 4);
      records[idx] = r;
      saveAll(records);
      closeEdit();
      render();
      toast('Record updated');
    }

    function deleteRecord(id) {
      if (!confirm('Delete this record?')) return;
      const records = loadAll().filter(r => r.id !== id);
      saveAll(records);
      render();
      toast('Deleted');
    }

    function copyJSONL() {
      const records = loadAll();
      if (records.length === 0) { toast('Nothing to copy'); return; }
      const jsonl = records.map(r => JSON.stringify(r)).join('\n');
      navigator.clipboard.writeText(jsonl)
        .then(() => toast(`Copied ${records.length} record${records.length === 1 ? '' : 's'}`))
        .catch(() => {
          // Fallback: show raw block so user can select-and-copy manually.
          document.getElementById('raw-block').style.display = 'block';
          document.getElementById('raw-json').textContent = jsonl;
          toast('Copy failed — raw view expanded');
        });
    }

    // Event bindings
    document.getElementById('list').addEventListener('click', (e) => {
      const card = e.target.closest('.record');
      if (!card) return;
      const id = card.dataset.id;
      if (e.target.classList.contains('edit')) openEdit(id);
      else if (e.target.classList.contains('delete')) deleteRecord(id);
    });
    document.getElementById('edit-cancel').addEventListener('click', closeEdit);
    document.getElementById('edit-save').addEventListener('click', saveEdit);
    document.getElementById('edit-backdrop').addEventListener('click', (e) => {
      if (e.target.id === 'edit-backdrop') closeEdit();
    });
    document.getElementById('copy-jsonl').addEventListener('click', copyJSONL);
    document.getElementById('toggle-raw').addEventListener('click', () => {
      const block = document.getElementById('raw-block');
      const shown = block.style.display !== 'none';
      block.style.display = shown ? 'none' : 'block';
      document.getElementById('toggle-raw').textContent = shown ? 'View raw' : 'Hide raw';
    });
    document.getElementById('wipe-all').addEventListener('click', () => {
      if (!confirm('Wipe ALL maintenance records on this device? This cannot be undone.')) return;
      localStorage.removeItem(STORAGE_KEY);
      render();
      toast('All records wiped');
    });

    render();
  </script>
</body>
</html>
